[tips-and-tricks-item-description]
tellus-briefing=[planet=tellus] to planeta zainfekowana bakteriami i pasożytami. Pyłki roślinne unoszące się w atmosferze pomagają [entity=small-wasp] w rozprzestrzenianiu się i reagują z niektórymi materiałami - rozwiązania tych problemów znajdziesz rozwijając telluriańskie technologie.\nChlorofil i grzybnię można uprawiać w [entity=condensing-agricultural-tower] i przetwarzać w [entity=planetaris-bioassembler].\nNa Tellusie nie występują [entity=iron-ore], [entity=copper-ore], [entity=crude-oil], [entity=coal] ani [entity=uranium-ore], ale rośliny zapewniają alternatywne sposoby pozyskiwania niezbędnych materiałów.\nWiększość produktów rolnych psuje się z czasem. Nawet [item=planetaris-bioengineering-science-pack] ma ograniczoną trwałość i nie może być bez końca magazynowany. Materiały patogenne po zepsuciu mogą wykluć wrogów - np. [item=planetaris-pathological-science-pack] eksploduje i uwalnia [entity=big-wasp].
tellus-bioassembler=[entity=planetaris-bioassembler] pozwala przetwarzać telluriańskie materiały.\nSą to żywe konstrukcje - należy je zasadzić przy użyciu [item=planetaris-bioassembler-seed] na dowolnym naturalnym podłożu. Jak wszystkie rośliny, [entity=planetaris-bioassembler] z czasem obumierają; aby je utrzymać przy życiu, podaj im [item=nutrients], zanim się rozłożą.\n[entity=planetaris-bioassembler] mogą być stawiane przez [entity=construction-robot].
tellus-roots=Rury szybko korodują pod wpływem pyłków roślinnych, a telluriańskie maszyny nie łączą się z [entity=pipe]. Do transportu płynów musisz używać [entity=planetaris-root]. Korzenie można napełniać płynami ze standardowych rur za pomocą [entity=planetaris-root-filler].

